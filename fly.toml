# fly.toml app configuration file generated for pidorometr3000 on 2026-06-23T16:11:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pidorometr3000'
primary_region = 'ams'
kill_signal = 'SIGINT'
kill_timeout = '30s'

[build]

[processes]
  app = '/run-app'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
